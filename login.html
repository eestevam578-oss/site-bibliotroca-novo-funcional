<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BiblioTroca</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <h1>BiblioTroca</h1>
                <p>Troca de livros entre alunos</p>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Início</a></li>
                    <li><a href="livros.html">Livros Disponíveis</a></li>
                    <li><a href="perfil.html" id="perfil-link">Meu Perfil</a></li>
                    <li><a href="login.html" id="login-link" class="active">Entrar</a></li>
                    <li><a href="#" id="logout-link" style="display: none;">Sair</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="form-section">
        <div class="container">
            <div class="form-container">
                <h2>Entrar</h2>
                <form id="form-login">
                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="senha">Senha</label>
                        <div class="password-input-wrapper">
                            <input type="password" id="senha" name="senha" required>
                            <button type="button" class="toggle-password" data-target="senha">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="form-footer">
                        <button type="submit" class="btn">Entrar</button>
                        <p>Não tem uma conta? <a href="cadastro.html">Cadastre-se</a></p>
                        
                        <div style="margin-top: 25px; border-top: 1px solid #eee; padding-top: 15px;">
                            <button type="button" id="btn-admin-login" class="btn btn-outline" style="width: 100%; border-color: #e67e22; color: #e67e22;">
                                <i class="fas fa-user-shield"></i> Entrar como Administrador
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2025 BiblioTroca - Todos os direitos reservados</p>
        </div>
    </footer>

    <!-- Chat de Ajuda / Informação de Troca -->
    <div class="chat-widget" id="chat-widget">
        <div class="chat-header" id="chat-header">
            <span><i class="fas fa-info-circle"></i> Onde Trocar?</span>
            <button id="close-chat"><i class="fas fa-times"></i></button>
        </div>
        <div class="chat-body" id="chat-body">
            <p>Olá! Escolha o seu ano para saber onde realizar a troca de livros:</p>
            <div class="chat-options">
                <button class="chat-opt-btn" data-ano="1">1º Ano Médio</button>
                <button class="chat-opt-btn" data-ano="2">2º Ano Médio</button>
                <button class="chat-opt-btn" data-ano="3">3º Ano Médio</button>
            </div>
            <div id="chat-result" class="chat-result" style="display: none;">
                <!-- O resultado aparecerá aqui -->
            </div>
        </div>
    </div>
    <button id="open-chat-btn" class="open-chat-btn">
        <i class="fas fa-comments"></i>
        <span>Onde Trocar?</span>
        <span class="novelty-indicator"><i class="fas fa-exclamation"></i></span>
    </button>

    <script src="js/script.js"></script>
</body>
</html>
