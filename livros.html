<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livros Disponíveis - BiblioTroca</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <h1>BiblioTroca</h1>
                <p>Troca de livros entre alunos</p>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Início</a></li>
                    <li><a href="livros.html" class="active">Livros Disponíveis</a></li>
                    <li><a href="perfil.html" id="perfil-link">Meu Perfil</a></li>
                    <li><a href="login.html" id="login-link">Entrar</a></li>
                    <li><a href="#" id="logout-link" style="display: none;">Sair</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="books-section">
        <div class="container">
            <h2>Livros Disponíveis para Troca</h2>
            
            <div class="search-filters">
                <div class="form-group">
                    <input type="text" id="search-input" placeholder="Buscar por título ou autor...">
                </div>
                <div class="form-group">
                    <select id="filter-disciplina">
                        <option value="">Todas as disciplinas</option>
                        <option value="Português">Português</option>
                        <option value="Matemática">Matemática</option>
                        <option value="História">História</option>
                        <option value="Geografia">Geografia</option>
                        <option value="Biologia">Biologia</option>
                        <option value="Física">Física</option>
                        <option value="Química">Química</option>
                        <option value="Inglês">Inglês</option>
                        <option value="Espanhol">Espanhol</option>
                        <option value="Filosofia">Filosofia</option>
                        <option value="Sociologia">Sociologia</option>
                        <option value="Educação Física">Educação Física</option>
                        <option value="Artes">Artes</option>
                        <option value="Literatura">Literatura</option>
                        <option value="Outro">Outro</option>
                    </select>
                </div>
                <div class="form-group">
                    <select id="filter-ano">
                        <option value="">Todos os anos e cursos</option>
                        <option value="1º Ano Administração">1º Ano - Administração</option>
                        <option value="2º Ano Administração">2º Ano - Administração</option>
                        <option value="3º Ano Administração">3º Ano - Administração</option>
                        <option value="1º Ano Meio Ambiente">1º Ano - Meio Ambiente</option>
                        <option value="2º Ano Meio Ambiente">2º Ano - Meio Ambiente</option>
                        <option value="3º Ano Meio Ambiente">3º Ano - Meio Ambiente</option>
                        <option value="1º Ano Recursos Humanos">1º Ano - Recursos Humanos</option>
                        <option value="2º Ano Recursos Humanos">2º Ano - Recursos Humanos</option>
                        <option value="3º Ano Recursos Humanos">3º Ano - Recursos Humanos</option>
                    </select>
                </div>
            </div>
            
            <div class="books-grid" id="livros-disponiveis">
                <!-- Os livros serão carregados dinamicamente pelo JavaScript -->
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2025 BiblioTroca - Todos os direitos reservados</p>
        </div>
    </footer>

    <!-- Chat de Ajuda / Informação de Troca -->
    <div class="chat-widget" id="chat-widget">
        <div class="chat-header" id="chat-header">
            <span><i class="fas fa-info-circle"></i> Onde Trocar?</span>
            <button id="close-chat"><i class="fas fa-times"></i></button>
        </div>
        <div class="chat-body" id="chat-body">
            <p>Olá! Escolha o seu ano para saber onde realizar a troca de livros:</p>
            <div class="chat-options">
                <button class="chat-opt-btn" data-ano="1">1º Ano Médio</button>
                <button class="chat-opt-btn" data-ano="2">2º Ano Médio</button>
                <button class="chat-opt-btn" data-ano="3">3º Ano Médio</button>
            </div>
            <div id="chat-result" class="chat-result" style="display: none;">
                <!-- O resultado aparecerá aqui -->
            </div>
        </div>
    </div>
    <button id="open-chat-btn" class="open-chat-btn">
        <i class="fas fa-comments"></i>
        <span>Onde Trocar?</span>
        <span class="novelty-indicator"><i class="fas fa-exclamation"></i></span>
    </button>

    <script src="js/script.js"></script>
</body>
</html>
